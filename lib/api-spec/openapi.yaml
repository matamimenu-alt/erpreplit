        referenceNo:     { type: string, nullable: true }
        notes:           { type: string, nullable: true }
        createdAt:       { type: string }
        updatedAt:       { type: string }
      required: [id, restaurantId, date, month, categoryCode, description, amount, isVatApplicable, vatType, vatRate, vatAmount, totalAmount]


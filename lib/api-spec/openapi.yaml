        nameAr:     { type: string,  description: "Arabic display name" }
        parentCode: { type: string,  description: "Parent code (e.g. '5-1' to nest under Operational Expenses)" }
        nature:     { type: string, enum: [fixed, variable], description: "Fixed or Variable cost — REQUIRED for the new category" }
      required: [name, nameAr, parentCode, nature]

    UpdateExpenseCategory:
      type: object
      properties:
        name:     { type: string }
        nameAr:   { type: string }
        nature:   { type: string, enum: [fixed, variable] }

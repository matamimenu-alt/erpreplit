openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Restaurant Management & Accounting System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: restaurants
    description: Branch & restaurant management
  - name: sales
    description: Sales management
  - name: purchases
    description: Purchase management
  - name: suppliers
    description: Supplier management
  - name: employees
    description: Employee management
  - name: expenses
    description: Fixed expenses management
  - name: vat
    description: VAT reporting
  - name: dashboard
    description: Financial dashboard
  - name: reports
    description: Report generation
  - name: stock
    description: Inventory & stock management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Restaurants / Branch Management
  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: List restaurants (excludes archived by default)
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: string
          description: Pass "true" to include archived branches
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"
    post:
      operationId: createRestaurant
      tags: [restaurants]
      summary: Create a new branch/restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurant"
      responses:
        "201":
          description: Created restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurants/group/summary:
    get:
      operationId: getGroupSummary
      tags: [restaurants]
      summary: Consolidated KPI summary across all active branches
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: Group consolidated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupSummary"

  /restaurants/{id}:
    put:
      operationId: updateRestaurant
      tags: [restaurants]
      summary: Update branch information
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurant"
      responses:
        "200":
          description: Updated restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    delete:
      operationId: deleteRestaurant
      tags: [restaurants]
      summary: Soft-delete (archive) a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  id:
                    type: integer

  /restaurants/{id}/status:
    patch:
      operationId: setRestaurantStatus
      tags: [restaurants]
      summary: Set restaurant status (active/inactive/archived)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, inactive, archived]
              required: [status]
      responses:
        "200":
          description: Updated restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  # Sales
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales records
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: from
          in: query
          schema:
            type: string
          description: Filter from date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
          description: Filter to date (YYYY-MM-DD)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sales record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    put:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales/monthly-summary:
    get:
      operationId: getMonthlySalesSummary
      tags: [sales]
      summary: Get monthly sales summary
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySalesSummary"

  /sales/app-config:
    get:
      operationId: getSalesAppConfig
      tags: [sales]
      summary: Get sales app configuration (app names, default VAT mode)
      responses:
        "200":
          description: App config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesAppConfig"
    put:
      operationId: updateSalesAppConfig
      tags: [sales]
      summary: Update sales app configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesAppConfig"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesAppConfig"

  /sales/report:
    get:
      operationId: getSalesReport
      tags: [sales]
      summary: Get sales report with date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
          description: From date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
          description: To date (YYYY-MM-DD)
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  # Purchases
  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List all purchases
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: search
          in: query
          schema:
            type: string
          description: Search by product name
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/products:
    get:
      operationId: getPurchaseProductSuggestions
      tags: [purchases]
      summary: List distinct products with last category and price
      responses:
        "200":
          description: List of known products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseProductSuggestion"

  /purchases/batch:
    post:
      operationId: createPurchaseBatch
      tags: [purchases]
      summary: Create multiple purchase items under one invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBatch"
      responses:
        "201":
          description: Created batch invoice
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Purchase"
                required:
                  - invoiceId
                  - items

  /purchases/{id}:
    put:
      operationId: updatePurchase
      tags: [purchases]
      summary: Update a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "200":
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
    delete:
      operationId: deletePurchase
      tags: [purchases]
      summary: Delete a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Suppliers
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /suppliers/price-comparison:
    get:
      operationId: getSupplierPriceComparison
      tags: [suppliers]
      summary: Get supplier price comparison
      responses:
        "200":
          description: Price comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceComparison"

  # Supplier Products — by supplier ID
  /suppliers/{id}/products:
    get:
      operationId: getSupplierProducts
      tags: [suppliers]
      summary: Get products for a specific supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of products for this supplier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"

  # Supplier Products
  /supplier-products/products:
    get:
      operationId: listSupplierProducts
      tags: [suppliers]
      summary: List supplier products
      responses:
        "200":
          description: List of supplier products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"
    post:
      operationId: createSupplierProduct
      tags: [suppliers]
      summary: Create a supplier product price entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "201":
          description: Created supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"

  /supplier-products/products/{id}:
    put:
      operationId: updateSupplierProduct
      tags: [suppliers]
      summary: Update a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "200":
          description: Updated supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"
    delete:
      operationId: deleteSupplierProduct
      tags: [suppliers]
      summary: Delete a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Employees
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Fixed Costs (Dynamic Monthly)
  /fixed-costs/templates:
    get:
      operationId: listFixedCostTemplates
      tags: [fixed-costs]
      summary: List all fixed cost templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixedCostTemplate"
    post:
      operationId: createFixedCostTemplate
      tags: [fixed-costs]
      summary: Create a fixed cost template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFixedCostTemplate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedCostTemplate"

  /fixed-costs/templates/{id}:
    put:
      operationId: updateFixedCostTemplate
      tags: [fixed-costs]
      summary: Update a fixed cost template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFixedCostTemplate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedCostTemplate"
    delete:
      operationId: deleteFixedCostTemplate
      tags: [fixed-costs]
      summary: Delete a fixed cost template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /fixed-costs/monthly:
    get:
      operationId: getMonthlyFixedCosts
      tags: [fixed-costs]
      summary: Get effective fixed costs for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Monthly fixed cost data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyFixedCosts"
    post:
      operationId: setMonthlyOverride
      tags: [fixed-costs]
      summary: Set a monthly override for a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMonthlyOverride"
      responses:
        "200":
          description: Override set
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/monthly/batch:
    post:
      operationId: batchSaveMonthlyFixedCosts
      tags: [fixed-costs]
      summary: Save all fixed cost amounts for a month at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSaveMonthlyFixedCosts"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/monthly/copy-prev:
    get:
      operationId: copyPrevMonthFixedCosts
      tags: [fixed-costs]
      summary: Get previous month values as starting point for new month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Previous month values
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/year-summary:
    get:
      operationId: getFixedCostYearSummary
      tags: [fixed-costs]
      summary: Get all 12 months of a year for comparison
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Year summary
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/monthly/{templateId}:
    delete:
      operationId: removeMonthlyOverride
      tags: [fixed-costs]
      summary: Remove a monthly override
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /fixed-costs/history:
    get:
      operationId: getFixedCostHistory
      tags: [fixed-costs]
      summary: Get fixed cost history for charting
      parameters:
        - name: months
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: History data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixedCostHistoryMonth"

  /fixed-costs/close-month:
    post:
      operationId: closeMonth
      tags: [fixed-costs]
      summary: Lock a month for editing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseMonthRequest"
      responses:
        "200":
          description: Month locked
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/unlock-month:
    post:
      operationId: unlockMonth
      tags: [fixed-costs]
      summary: Unlock a closed month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseMonthRequest"
      responses:
        "200":
          description: Month unlocked
          content:
            application/json:
              schema:
                type: object

  /fixed-costs/audit-log:
    get:
      operationId: getFixedCostAuditLog
      tags: [fixed-costs]
      summary: Get audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  /fixed-costs/effective-total:
    get:
      operationId: getFixedCostEffectiveTotal
      tags: [fixed-costs]
      summary: Get effective total for P&L
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Effective total
          content:
            application/json:
              schema:
                type: object

  # Expenses
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all fixed expenses
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Inventory
  /inventory:
    get:
      operationId: getInventory
      tags: [expenses]
      summary: Get closing inventory for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inventory record (or zeroed defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
    put:
      operationId: upsertInventory
      tags: [expenses]
      summary: Upsert closing inventory for a month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventory"
      responses:
        "200":
          description: Saved inventory record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"

  # VAT Report
  /vat/report:
    get:
      operationId: getVatReport
      tags: [vat]
      summary: Get VAT report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: VAT report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatReport"

  # P&L Report
  /reports/pl:
    get:
      operationId: getPLReport
      tags: [reports]
      summary: Get full Profit & Loss report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: P&L report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PLReport"

  /reports/purchases/monthly:
    get:
      operationId: getMonthlyPurchaseReport

        sortOrder:  { type: integer }
        isActive:   { type: boolean }
        # 'fixed' = recurring/predictable; 'variable' = volume-dependent.
        # null only on aggregate (level-0/1) nodes; required for leaves.
        nature:     { type: string, nullable: true, enum: [fixed, variable] }
      required: [id, code, name, nameAr, level, sortOrder, isActive]

    CreateExpenseCategory:
      type: object
      properties:

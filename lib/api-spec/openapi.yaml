openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Restaurant Management & Accounting System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sales
    description: Sales management
  - name: purchases
    description: Purchase management
  - name: suppliers
    description: Supplier management
  - name: employees
    description: Employee management
  - name: expenses
    description: Fixed expenses management
  - name: vat
    description: VAT reporting
  - name: dashboard
    description: Financial dashboard
  - name: reports
    description: Report generation
  - name: stock
    description: Inventory & stock management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Restaurants
  /restaurants:
    get:
      operationId: listRestaurants
      tags: [health]
      summary: List all restaurants
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  # Sales
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales records
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: from
          in: query
          schema:
            type: string
          description: Filter from date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
          description: Filter to date (YYYY-MM-DD)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sales record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    put:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales/monthly-summary:
    get:
      operationId: getMonthlySalesSummary
      tags: [sales]
      summary: Get monthly sales summary
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySalesSummary"

  /sales/app-config:
    get:
      operationId: getSalesAppConfig
      tags: [sales]
      summary: Get sales app configuration (app names, default VAT mode)
      responses:
        "200":
          description: App config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesAppConfig"
    put:
      operationId: updateSalesAppConfig
      tags: [sales]
      summary: Update sales app configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesAppConfig"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesAppConfig"

  /sales/report:
    get:
      operationId: getSalesReport
      tags: [sales]
      summary: Get sales report with date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
          description: From date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
          description: To date (YYYY-MM-DD)
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  # Purchases
  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List all purchases
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: search
          in: query
          schema:
            type: string
          description: Search by product name
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/products:
    get:
      operationId: getPurchaseProductSuggestions
      tags: [purchases]
      summary: List distinct products with last category and price
      responses:
        "200":
          description: List of known products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseProductSuggestion"

  /purchases/batch:
    post:
      operationId: createPurchaseBatch
      tags: [purchases]
      summary: Create multiple purchase items under one invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBatch"
      responses:
        "201":
          description: Created batch invoice
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Purchase"
                required:
                  - invoiceId
                  - items

  /purchases/{id}:
    put:
      operationId: updatePurchase
      tags: [purchases]
      summary: Update a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "200":
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
    delete:
      operationId: deletePurchase
      tags: [purchases]
      summary: Delete a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Suppliers
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /suppliers/price-comparison:
    get:
      operationId: getSupplierPriceComparison
      tags: [suppliers]
      summary: Get supplier price comparison
      responses:
        "200":
          description: Price comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceComparison"

  # Supplier Products — by supplier ID
  /suppliers/{id}/products:
    get:
      operationId: getSupplierProducts
      tags: [suppliers]
      summary: Get products for a specific supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of products for this supplier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"

  # Supplier Products
  /supplier-products/products:
    get:
      operationId: listSupplierProducts
      tags: [suppliers]
      summary: List supplier products
      responses:
        "200":
          description: List of supplier products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"
    post:
      operationId: createSupplierProduct
      tags: [suppliers]
      summary: Create a supplier product price entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "201":
          description: Created supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"

  /supplier-products/products/{id}:
    put:
      operationId: updateSupplierProduct
      tags: [suppliers]
      summary: Update a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "200":
          description: Updated supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"
    delete:
      operationId: deleteSupplierProduct
      tags: [suppliers]
      summary: Delete a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Employees
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Expenses
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all fixed expenses
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Inventory
  /inventory:
    get:
      operationId: getInventory
      tags: [expenses]
      summary: Get closing inventory for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inventory record (or zeroed defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
    put:
      operationId: upsertInventory
      tags: [expenses]
      summary: Upsert closing inventory for a month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventory"
      responses:
        "200":
          description: Saved inventory record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"

  # VAT Report
  /vat/report:
    get:
      operationId: getVatReport
      tags: [vat]
      summary: Get VAT report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: VAT report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatReport"

  # P&L Report
  /reports/pl:
    get:
      operationId: getPLReport
      tags: [reports]
      summary: Get full Profit & Loss report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: P&L report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PLReport"

  /reports/purchases/monthly:
    get:
      operationId: getMonthlyPurchaseReport
      tags: [reports]
      summary: Get monthly purchase totals
      responses:
        "200":
          description: Monthly purchase report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyPurchaseReport"

  /reports/purchases/by-category:
    get:
      operationId: getCategoryExpenseReport
      tags: [reports]
      summary: Get purchases grouped by category
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: Category expense report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryExpenseReport"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get financial dashboard summary
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # Stock / Inventory Management
  /stock/items:
    get:
      operationId: listStockItems
      tags: [stock]
      summary: Get current stock levels per item
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of stock items with current quantities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"

  /stock/movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      summary: List stock movements
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: movementType
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"
    post:
      operationId: createStockMovement
      tags: [stock]
      summary: Add a stock movement (consumption, adjustment, opening balance)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockMovement"
      responses:
        "201":
          description: Created stock movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  /stock/movements/{id}:
    delete:
      operationId: deleteStockMovement
      tags: [stock]
      summary: Delete a stock movement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stock/transfers:
    get:
      operationId: listBranchTransfers
      tags: [stock]
      summary: List branch transfers
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of branch transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchTransfer"
    post:
      operationId: createBranchTransfer
      tags: [stock]
      summary: Create a branch transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchTransfer"
      responses:
        "201":
          description: Created transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchTransfer"

  /stock/transfers/{id}:
    delete:
      operationId: deleteBranchTransfer
      tags: [stock]
      summary: Delete a branch transfer and reverse its stock movements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stock/report:
    get:
      operationId: getStockReport
      tags: [stock]
      summary: Get monthly inventory report
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
          description: Month in YYYY-MM format
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Monthly stock report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMonthlyReport"

  /dishes:
    get:
      operationId: listDishes
      tags: [dishes]
      summary: List all dishes with ingredients
      responses:
        "200":
          description: List of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DishWithIngredients"
    post:
      operationId: createDish
      tags: [dishes]
      summary: Create a new dish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDish"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                required: [id, name]

  /dishes/pricing:
    get:
      operationId: getDishPricing
      tags: [dishes]
      summary: Get full pricing breakdown for all dishes
      responses:
        "200":
          description: Pricing breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DishPricingResult"

  /dishes/config:
    get:
      operationId: getPricingConfig
      tags: [dishes]
      summary: Get pricing configuration
      responses:
        "200":
          description: Pricing config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingConfig"
    put:
      operationId: updatePricingConfig
      tags: [dishes]
      summary: Update pricing configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingConfig"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingConfig"

  /dishes/products:
    get:
      operationId: listPurchaseProducts
      tags: [dishes]
      summary: List available product names from purchases (for ingredient autocomplete)
      responses:
        "200":
          description: Product names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /dishes/{id}:
    put:
      operationId: updateDish
      tags: [dishes]
      summary: Update a dish
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDish"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                required: [id, name]
    delete:
      operationId: deleteDish
      tags: [dishes]
      summary: Delete a dish
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    Sale:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        cash:
          type: number
        card:
          type: number
        app1:
          type: number
        app2:
          type: number
        app3:
          type: number

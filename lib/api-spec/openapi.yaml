openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Restaurant Management & Accounting System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sales
    description: Sales management
  - name: purchases
    description: Purchase management
  - name: suppliers
    description: Supplier management
  - name: employees
    description: Employee management
  - name: expenses
    description: Fixed expenses management
  - name: vat
    description: VAT reporting
  - name: dashboard
    description: Financial dashboard
  - name: reports
    description: Report generation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Restaurants
  /restaurants:
    get:
      operationId: listRestaurants
      tags: [health]
      summary: List all restaurants
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"

  # Sales
  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales records
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sales record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    put:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales/monthly-summary:
    get:
      operationId: getMonthlySalesSummary
      tags: [sales]
      summary: Get monthly sales summary
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySalesSummary"

  # Purchases
  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List all purchases
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: search
          in: query
          schema:
            type: string
          description: Search by product name
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    put:
      operationId: updatePurchase
      tags: [purchases]
      summary: Update a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchase"
      responses:
        "200":
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
    delete:
      operationId: deletePurchase
      tags: [purchases]
      summary: Delete a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Suppliers
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplier"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /suppliers/price-comparison:
    get:
      operationId: getSupplierPriceComparison
      tags: [suppliers]
      summary: Get supplier price comparison
      responses:
        "200":
          description: Price comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceComparison"

  # Supplier Products
  /supplier-products:
    get:
      operationId: listSupplierProducts
      tags: [suppliers]
      summary: List supplier products
      responses:
        "200":
          description: List of supplier products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierProduct"
    post:
      operationId: createSupplierProduct
      tags: [suppliers]
      summary: Create a supplier product price entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "201":
          description: Created supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"

  /supplier-products/{id}:
    put:
      operationId: updateSupplierProduct
      tags: [suppliers]
      summary: Update a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProduct"
      responses:
        "200":
          description: Updated supplier product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierProduct"
    delete:
      operationId: deleteSupplierProduct
      tags: [suppliers]
      summary: Delete a supplier product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Employees
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployee"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Expenses
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all fixed expenses
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Inventory
  /inventory:
    get:
      operationId: getInventory
      tags: [expenses]
      summary: Get closing inventory for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inventory record (or zeroed defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
    put:
      operationId: upsertInventory
      tags: [expenses]
      summary: Upsert closing inventory for a month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventory"
      responses:
        "200":
          description: Saved inventory record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"

  # VAT Report
  /vat/report:
    get:
      operationId: getVatReport
      tags: [vat]
      summary: Get VAT report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: VAT report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VatReport"

  # P&L Report
  /reports/pl:
    get:
      operationId: getPLReport
      tags: [reports]
      summary: Get full Profit & Loss report
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: P&L report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PLReport"

  /reports/purchases/monthly:
    get:
      operationId: getMonthlyPurchaseReport
      tags: [reports]
      summary: Get monthly purchase totals
      responses:
        "200":
          description: Monthly purchase report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyPurchaseReport"

  /reports/purchases/by-category:
    get:
      operationId: getCategoryExpenseReport
      tags: [reports]
      summary: Get purchases grouped by category
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: Category expense report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryExpenseReport"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get financial dashboard summary
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: Filter by month (YYYY-MM)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    Sale:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        dineInFood:
          type: number
        dineInBeverage:
          type: number
        takeawayFood:
          type: number
        takeawayBeverage:
          type: number
        deliveryFood:
          type: number
        deliveryBeverage:
          type: number
        appSalesFood:
          type: number
        appSalesBeverage:
          type: number
        foodSales:
          type: number
        beverageSales:
          type: number
        totalSales:
          type: number
        outputVat:
          type: number
        createdAt:
          type: string
      required:
        - id
        - date
        - dineInFood
        - dineInBeverage
        - takeawayFood
        - takeawayBeverage
        - deliveryFood
        - deliveryBeverage
        - appSalesFood
        - appSalesBeverage
        - foodSales
        - beverageSales
        - totalSales
        - outputVat
        - createdAt

    CreateSale:
      type: object
      properties:
        date:
          type: string
        dineInFood:
          type: number
        dineInBeverage:
          type: number
        takeawayFood:
          type: number
        takeawayBeverage:
          type: number
        deliveryFood:
          type: number
        deliveryBeverage:
          type: number
        appSalesFood:
          type: number
        appSalesBeverage:
          type: number
      required:
        - date

    MonthlySalesSummary:
      type: object
      properties:
        month:
          type: string
        totalFoodSales:
          type: number
        totalBeverageSales:
          type: number
        totalSales:
          type: number
        totalOutputVat:
          type: number
      required:
        - month
        - totalFoodSales
        - totalBeverageSales
        - totalSales
        - totalOutputVat

    PurchaseCategory:
      type: string
      enum:
        - cost-food
        - cost-beverage
        - cost-general
        - fuel-energy
        - maintenance
        - it-communication
        - marketing
        - others

    Purchase:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        supplierName:
          type: string
        productName:
          type: string
        category:
          $ref: "#/components/schemas/PurchaseCategory"
        quantity:
          type: number
        price:
          type: number
        priceIncludesVat:
          type: boolean
        amountBeforeVat:
          type: number
        vatAmount:
          type: number
        totalAmount:
          type: number
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - date
        - supplierName
        - productName
        - category
        - quantity
        - price
        - priceIncludesVat
        - amountBeforeVat
        - vatAmount
        - totalAmount
        - createdAt

    CreatePurchase:
      type: object
      properties:
        date:
          type: string
        supplierName:
          type: string
        productName:
          type: string
        category:
          $ref: "#/components/schemas/PurchaseCategory"
        quantity:
          type: number
        price:
          type: number
        priceIncludesVat:
          type: boolean
        notes:
          type: string
          nullable: true
      required:
        - date
        - productName
        - category
        - quantity
        - price
        - priceIncludesVat

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    CreateSupplier:
      type: object
      properties:
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
      required:
        - name

    SupplierProduct:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: string
        productName:
          type: string
        previousPrice:
          type: number
        currentPrice:
          type: number
        priceDifference:
          type: number
        priceChangePercent:
          type: number
        updatedAt:
          type: string
      required:
        - id
        - supplierId
        - supplierName
        - productName
        - currentPrice
        - priceDifference
        - priceChangePercent
        - updatedAt

    CreateSupplierProduct:
      type: object
      properties:
        supplierId:
          type: integer
        productName:
          type: string
        previousPrice:
          type: number
        currentPrice:
          type: number
      required:
        - supplierId
        - productName
        - currentPrice

    PriceComparison:
      type: object
      properties:
        supplierId:
          type: integer
        supplierName:
          type: string
        productName:
          type: string
        previousPrice:
          type: number
        currentPrice:
          type: number
        priceDifference:
          type: number
        priceChangePercent:
          type: number
        trend:
          type: string
          enum: [up, down, stable]
      required:
        - supplierId
        - supplierName
        - productName
        - currentPrice
        - priceDifference
        - priceChangePercent
        - trend

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        designation:
          type: string
        fullTime:
          type: boolean
        nationality:
          type: string
        joiningDate:
          type: string
          nullable: true
        numberOfMonths:
          type: number
        salary:
          type: number
        socialSecurity:
          type: number
        laborFees:
          type: number
        iqamaRenewalYearly:
          type: number
        medicalInsurance:
          type: number
        airTicketCost:
          type: number
        foodMeal:
          type: number
        monthlyIqamaRenewal:
          type: number
        monthlyMedical:
          type: number
        monthlyAirTicket:
          type: number
        monthlyIndemnity:
          type: number
        monthlyVacation:
          type: number
        totalPayrollTaxes:
          type: number
        totalEmployeesBenefits:
          type: number
        totalMonthlyCost:
          type: number
        iqamaExpiryDate:
          type: string
          nullable: true
        iqamaRenewalDate:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - designation
        - fullTime
        - nationality
        - salary
        - socialSecurity
        - laborFees
        - iqamaRenewalYearly
        - medicalInsurance
        - airTicketCost
        - foodMeal
        - monthlyIqamaRenewal
        - monthlyMedical
        - monthlyAirTicket
        - monthlyIndemnity
        - monthlyVacation
        - totalPayrollTaxes
        - totalEmployeesBenefits
        - totalMonthlyCost
        - numberOfMonths
        - createdAt

    CreateEmployee:
      type: object
      properties:
        name:
          type: string
        designation:
          type: string
        fullTime:
          type: boolean
        nationality:
          type: string
        joiningDate:
          type: string
          nullable: true
        salary:
          type: number
        socialSecurity:
          type: number
        laborFees:
          type: number
        iqamaRenewalYearly:
          type: number
        medicalInsurance:
          type: number
        airTicketCost:
          type: number
        foodMeal:
          type: number
        iqamaExpiryDate:
          type: string
          nullable: true
        iqamaRenewalDate:
          type: string
          nullable: true
      required:
        - name
        - designation
        - salary

    Expense:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        name:
          type: string
        monthlyCost:
          type: number
        notes:
          type: string
        contractStartDate:
          type: string
        contractEndDate:
          type: string
        createdAt:
          type: string
      required:
        - id
        - category
        - name
        - monthlyCost
        - createdAt

    CreateExpense:
      type: object
      properties:
        category:
          type: string
        name:
          type: string
        monthlyCost:
          type: number
        notes:
          type: string
        contractStartDate:
          type: string
        contractEndDate:
          type: string
      required:
        - name
        - monthlyCost

    Inventory:
      type: object
      properties:
        id:
          type: integer
        month:
          type: string
        foodInventory:
          type: number
        beverageInventory:
          type: number
        generalInventory:
          type: number
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - month
        - foodInventory
        - beverageInventory
        - generalInventory
        - createdAt

    CreateInventory:
      type: object
      properties:
        month:
          type: string
        foodInventory:
          type: number
        beverageInventory:
          type: number
        generalInventory:
          type: number
        notes:
          type: string
      required:
        - month
        - foodInventory
        - beverageInventory
        - generalInventory

    PLReport:
      type: object
      properties:
        month:
          type: string
        dineInFood:
          type: number
        dineInBeverage:
          type: number
        takeawayFood:
          type: number
        takeawayBeverage:
          type: number
        deliveryFood:
          type: number
        deliveryBeverage:
          type: number
        appSalesFood:
          type: number
        appSalesBeverage:
          type: number
        foodSales:
          type: number
        beverageSales:
          type: number
        totalRevenue:
          type: number
        foodCost:
          type: number
        beverageCost:
          type: number
        otherCost:
          type: number
        totalCOGS:
          type: number
        closingFoodInventory:
          type: number
        closingBeverageInventory:
          type: number
        closingGeneralInventory:
          type: number
        totalInventoryAdjustment:
          type: number
        adjustedFoodCost:
          type: number
